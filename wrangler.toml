name = "theplantstore"
main = "functions/api/products.js"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "houseplantstore-db"
database_id = "b4117a97-7ef0-424a-93f7-..." # You'll get this from the binding setup

# Environment variables
[vars]
NEXT_PUBLIC_SITE_URL = "https://thehouseplantstore.com"
NEXT_PUBLIC_SITE_NAME = "The Plant Store"
NEXT_PUBLIC_CONTACT_EMAIL = "info@theplantstore.com"
NEXT_PUBLIC_PHONE = "+27 11 123 4567"

# Functions configuration
[functions]
directory = "functions"

# Pages configuration (for static site)
[pages]
directory = "out" 